<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioHub Premium - Catálogo de Música</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            /* Fondo base un poco más oscuro para máximo contraste */
            --bg-dark: #09090c; 
            --card-bg: rgba(22, 22, 30, 0.65);
            --neon-gradient: linear-gradient(135deg, #b040ff 0%, #3e00cf 100%);
            --neon-glow: rgba(176, 64, 255, 0.4);
            
            /* Colores de texto ajustados para legibilidad perfecta */
            --text-main: #ffffff;
            --text-secondary: #c8c8e6; /* Gris azulado muy claro para etiquetas */
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(176, 64, 255, 0.08), transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(62, 0, 207, 0.08), transparent 25%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-up {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header-brand {
            background: var(--neon-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            padding: 2.5rem;
            transition: border-color 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* --- CORRECCIÓN DE INPUTS Y ETIQUETAS --- */
        .form-label {
            color: var(--text-secondary) !important;
            letter-spacing: 1.5px;
            font-size: 0.75rem;
            margin-bottom: 0.6rem;
        }

        .custom-input {
            background-color: var(--input-bg) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important; /* Fuerza a que el texto que escribas sea blanco puro */
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        /* Efecto de resplandor (Glow) al escribir */
        .custom-input:focus {
            background-color: rgba(0, 0, 0, 0.6) !important;
            border-color: #b040ff !important;
            box-shadow: 0 0 15px var(--neon-glow) !important;
            outline: none;
        }

        /* Corrección de la opacidad del placeholder para que sea legible */
        .custom-input::placeholder { 
            color: rgba(255, 255, 255, 0.5) !important; 
            font-weight: 300;
        }

        /* Aseguramos que las opciones del Select se vean bien en Windows/Mac */
        select.custom-input option {
            background-color: #16161e;
            color: #ffffff;
            padding: 10px;
        }

        /* --- BOTÓN PREMIUM --- */
        .btn-neon {
            background: var(--neon-gradient);
            color: white;
            border: none;
            border-radius: 1rem;
            padding: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .btn-neon:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px var(--neon-glow);
            color: white;
        }

        /* --- TABLA --- */
        .playlist-table {
            border-collapse: separate;
            border-spacing: 0 12px;
            margin-top: -12px;
            --bs-table-bg: transparent; 
            --bs-table-color: var(--text-main);
        }

        .playlist-table thead th {
            border: none;
            color: var(--text-secondary) !important; 
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding-bottom: 0.5rem;
            background: transparent !important; 
        }

        .playlist-table tbody tr {
            background-color: rgba(255, 255, 255, 0.04) !important; 
            transition: all 0.2s ease;
        }

        .playlist-table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.08) !important;
            transform: translateX(5px); /* Pequeño desplazamiento a la derecha al pasar el mouse */
        }

        .playlist-table td {
            border: none;
            padding: 1.2rem 1.2rem;
            vertical-align: middle;
            color: var(--text-main) !important; 
            background-color: transparent !important; 
        }

        .playlist-table td:first-child { border-radius: 1rem 0 0 1rem; }
        .playlist-table td:last-child { border-radius: 0 1rem 1rem 0; }
        
        .empty-state-icon {
            width: 80px; 
            height: 80px; 
            background: rgba(255,255,255,0.03);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
        }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5 animate-up" style="animation-delay: 0.1s;">
        <div>
            <h1 class="display-5 header-brand mb-0"><i class="bi bi-soundwave me-2 text-white"></i>AudioHub</h1>
            <p class="text-white-50 mb-0 mt-1">EPN Event Manager System</p>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white-50 d-none d-md-inline">Hola, Administrador</span>
            <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center border" style="width: 45px; height: 45px; border-color: rgba(255,255,255,0.15)!important;">
                <i class="bi bi-person-fill text-white"></i>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-xl-4 col-lg-5 animate-up" style="animation-delay: 0.2s;">
            <div class="glass-card h-100">
                <h4 class="fw-bold mb-4 d-flex align-items-center">
                    <i class="bi bi-plus-circle-dotted me-2" style="color: #b040ff;"></i> Añadir a la librería
                </h4>
                
                <form id="audioForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold">TIPO DE AUDIO</label>
                        <select class="form-select custom-input" id="tipo" required>
                            <option value="Cancion">🎵 Canción</option>
                            <option value="Podcast">🎙️ Podcast</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">TÍTULO</label>
                        <input type="text" class="form-control custom-input" id="titulo" required placeholder="Ej. Bohemian Rhapsody">
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label fw-bold">ARTISTA / AUTOR</label>
                        <input type="text" class="form-control custom-input" id="autor" required placeholder="Ej. Queen">
                    </div>
                    
                    <button type="submit" class="btn btn-neon w-100">
                        <i class="bi bi-collection-play-fill me-2"></i> Guardar en Biblioteca
                    </button>
                </form>
            </div>
        </div>

        <div class="col-xl-8 col-lg-7 animate-up" style="animation-delay: 0.3s;">
            <div class="glass-card h-100">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Mi Biblioteca</h4>
                    <button id="btnActualizar" class="btn btn-sm btn-outline-light rounded-pill px-4 py-2" style="border-color: rgba(255,255,255,0.2);">
                        <i class="bi bi-arrow-repeat me-1"></i> Refrescar
                    </button>
                </div>
                
                <div class="table-responsive">
                    <table class="table playlist-table mb-0 w-100">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Título</th>
                                <th>Artista</th>
                                <th class="text-end"><i class="bi bi-gear"></i></th>
                            </tr>
                        </thead>
                        <tbody id="tablaAudios">
                            <tr>
                                <td colspan="4" class="text-center py-5">
                                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-4 empty-state-icon">
                                        <i class="bi bi-music-note-list text-white-50" style="font-size: 2.5rem;"></i>
                                    </div>
                                    <h5 class="text-white fw-bold">Tu biblioteca está vacía</h5>
                                    <p class="text-white-50 mb-0">Añade tu primera canción o podcast desde el panel lateral.</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
