<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 SPACE MISSION CONTROL — EPN FIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #020408; --deep: #050d1a; --cosmos: #0a1628;
  --star: #e8f4ff; --pulse: #00d4ff; --flare: #ff6b35;
  --nova: #7b2fff; --aurora: #00ff9f; --warn: #ffcc00;
  --danger: #ff3366; --glass: rgba(0,212,255,0.05);
  --border: rgba(0,212,255,0.16);
}
*{margin:0;padding:0;box-sizing:border-box;}
body { background:var(--void); color:var(--star); font-family:'Exo 2',sans-serif; min-height:100vh; overflow-x:hidden; }
#stars { position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(ellipse at 20% 50%,rgba(123,47,255,.07) 0%,transparent 50%),
              radial-gradient(ellipse at 80% 20%,rgba(0,212,255,.05) 0%,transparent 50%); }
.s { position:absolute; border-radius:50%; background:#fff; animation:tw var(--d,3s) ease-in-out infinite; }
@keyframes tw { 0%,100%{opacity:.15} 50%{opacity:.9} }
header {
  position:relative; z-index:10; padding:20px 36px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(0,212,255,.04) 0%,transparent 100%);
  display:flex; align-items:center; gap:16px;
}
.logo { width:48px; height:48px; border-radius:50%; border:2px solid var(--pulse);
  display:grid; place-items:center; font-size:20px;
  box-shadow:0 0 18px rgba(0,212,255,.35); animation:spin 25s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.htxt h1 { font-family:'Orbitron',monospace; font-size:clamp(12px,2vw,20px); font-weight:900; letter-spacing:4px; }
.htxt p { font-family:'Share Tech Mono'; font-size:10px; color:var(--pulse); letter-spacing:2px; margin-top:2px; }
.hub-pill { margin-left:auto; display:flex; align-items:center; gap:7px;
  font-family:'Share Tech Mono'; font-size:11px; padding:6px 14px; border-radius:20px;
  background:rgba(255,51,102,.08); border:1px solid rgba(255,51,102,.3); transition:all .3s; }
.hub-pill.ok { background:rgba(0,255,159,.08); border-color:rgba(0,255,159,.3); }
.dot { width:7px; height:7px; border-radius:50%; background:var(--danger); animation:bk 1.4s ease-in-out infinite; }
.dot.ok { background:var(--aurora); }
@keyframes bk { 0%,100%{opacity:1} 50%{opacity:.2} }
.stats { position:relative; z-index:10; display:grid; grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--border); }
.stat { background:var(--deep); padding:12px 20px; border-right:1px solid var(--border); }
.stat:last-child{border-right:none;}
.sn { font-family:'Orbitron',monospace; font-size:24px; font-weight:700; }
.sl { font-size:9px; letter-spacing:2px; color:rgba(232,244,255,.4); text-transform:uppercase; margin-top:1px; }
.c1{color:var(--pulse);text-shadow:0 0 15px rgba(0,212,255,.5);}
.c2{color:var(--aurora);text-shadow:0 0 15px rgba(0,255,159,.5);}
.c3{color:var(--nova);text-shadow:0 0 15px rgba(123,47,255,.5);}
.c4{color:var(--flare);text-shadow:0 0 15px rgba(255,107,53,.5);}
.layout { position:relative; z-index:10; display:grid; grid-template-columns:400px 1fr; min-height:calc(100vh - 140px); }
.fp { background:var(--deep); border-right:1px solid var(--border); padding:24px;
  display:flex; flex-direction:column; gap:16px; overflow-y:auto; max-height:calc(100vh - 140px); }
.ptitle { font-family:'Orbitron',monospace; font-size:10px; font-weight:700; letter-spacing:3px;
  color:var(--pulse); text-transform:uppercase; display:flex; align-items:center; gap:8px; }
.ptitle::after { content:''; flex:1; height:1px; background:var(--border); }
.fg { display:flex; flex-direction:column; gap:5px; }
label { font-size:9px; letter-spacing:2px; color:rgba(232,244,255,.45); text-transform:uppercase; font-family:'Share Tech Mono'; }
input,select,textarea {
  background:rgba(0,212,255,.04); border:1px solid var(--border); color:var(--star);
  padding:9px 13px; border-radius:6px; font-family:'Exo 2',sans-serif; font-size:13px;
  transition:border-color .2s,box-shadow .2s; outline:none; width:100%;
}
input:focus,select:focus,textarea:focus { border-color:var(--pulse); box-shadow:0 0 0 3px rgba(0,212,255,.1); }
select option { background:var(--cosmos); }
textarea { resize:vertical; min-height:65px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.eb { display:none; background:rgba(255,107,53,.1); border:1px solid rgba(255,107,53,.3);
  border-radius:6px; padding:8px 12px; font-family:'Share Tech Mono'; font-size:11px;
  color:var(--flare); align-items:center; gap:8px; }
.eb.show { display:flex; }
.btn-p { background:linear-gradient(135deg,var(--pulse),#0099cc); border:none; color:#000;
  padding:11px 20px; border-radius:6px; font-family:'Orbitron',monospace; font-size:10px;
  font-weight:700; letter-spacing:2px; cursor:pointer; transition:all .2s; text-transform:uppercase;
  box-shadow:0 4px 18px rgba(0,212,255,.3); width:100%; }
.btn-p:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,212,255,.4); }
.btn-p:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.btn-s { background:transparent; border:1px solid var(--border); color:var(--star);
  padding:9px 16px; border-radius:6px; font-family:'Orbitron',monospace; font-size:9px;
  font-weight:600; letter-spacing:2px; cursor:pointer; transition:all .2s; text-transform:uppercase; }
.btn-s:hover { border-color:var(--pulse); color:var(--pulse); }
.brow { display:flex; gap:8px; margin-top:2px; }
.brow .btn-p { flex:1; }
.elog { background:rgba(0,0,0,.35); border:1px solid var(--border); border-radius:8px;
  padding:10px; max-height:110px; overflow-y:auto; font-family:'Share Tech Mono'; font-size:10px;
  display:flex; flex-direction:column; gap:3px; }
.le { color:rgba(232,244,255,.35); display:flex; gap:8px; }
.le.ok .lm { color:var(--aurora); }
.le.err .lm { color:var(--danger); }
.le.warn .lm { color:var(--warn); }
.le .lt { color:rgba(0,212,255,.5); min-width:75px; }
.mp { background:var(--void); display:flex; flex-direction:column; }
.mh { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.sb { flex:1; background:rgba(0,212,255,.04); border:1px solid var(--border); color:var(--star);
  padding:8px 13px; border-radius:6px; font-family:'Share Tech Mono'; font-size:12px; outline:none; }
.sb:focus { border-color:var(--pulse); }
.fbs { display:flex; gap:5px; flex-wrap:wrap; }
.fb { background:transparent; border:1px solid var(--border); color:rgba(232,244,255,.45);
  padding:5px 10px; border-radius:4px; font-size:9px; font-family:'Share Tech Mono'; cursor:pointer;
  transition:all .15s; letter-spacing:1px; }
.fb:hover,.fb.act { border-color:var(--pulse); color:var(--pulse); background:rgba(0,212,255,.08); }
.ml { flex:1; overflow-y:auto; padding:16px 24px; display:flex; flex-direction:column; gap:10px; max-height:calc(100vh - 220px); }
.mc { background:var(--glass); border:1px solid var(--border); border-radius:10px;
  padding:14px 18px; display:grid; grid-template-columns:1fr auto; gap:8px;
  transition:all .2s; position:relative; overflow:hidden; animation:fu .3s ease both; }
@keyframes fu { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.mc::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:var(--cc,var(--pulse)); border-radius:10px 0 0 10px; }
.mc:hover { border-color:rgba(0,212,255,.3); transform:translateX(3px); }
.mc[data-s="active"]    {--cc:var(--aurora)}
.mc[data-s="completed"] {--cc:var(--nova)}
.mc[data-s="failed"]    {--cc:var(--danger)}
.mc[data-s="aborted"]   {--cc:var(--warn)}
.mid { font-family:'Share Tech Mono'; font-size:9px; color:rgba(0,212,255,.5); letter-spacing:2px; }
.mn  { font-family:'Orbitron',monospace; font-size:13px; font-weight:700; margin:3px 0; }
.mm  { display:flex; gap:8px; flex-wrap:wrap; margin-top:5px; }
.mt  { font-family:'Share Tech Mono'; font-size:10px; background:rgba(232,244,255,.06);
  border:1px solid rgba(232,244,255,.1); padding:2px 8px; border-radius:4px; color:rgba(232,244,255,.6); }
.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:12px;
  font-size:9px; font-family:'Share Tech Mono'; letter-spacing:1px; }
.badge.planned   {background:rgba(0,212,255,.12);color:var(--pulse);border:1px solid rgba(0,212,255,.3)}
.badge.active    {background:rgba(0,255,159,.12);color:var(--aurora);border:1px solid rgba(0,255,159,.3)}
.badge.completed {background:rgba(123,47,255,.12);color:var(--nova);border:1px solid rgba(123,47,255,.3)}
.badge.failed    {background:rgba(255,51,102,.12);color:var(--danger);border:1px solid rgba(255,51,102,.3)}
.badge.aborted   {background:rgba(255,204,0,.12);color:var(--warn);border:1px solid rgba(255,204,0,.3)}
.mdesc { font-size:11px; color:rgba(232,244,255,.4); margin-top:4px; line-height:1.5; }
.acts  { display:flex; flex-direction:column; gap:5px; align-items:flex-end; }
.ab { background:transparent; border:1px solid var(--border); color:rgba(232,244,255,.45);
  width:30px; height:30px; border-radius:5px; cursor:pointer; font-size:13px; display:grid; place-items:center; transition:all .15s; }
.ab:hover.e { border-color:var(--warn); color:var(--warn); background:rgba(255,204,0,.1); }
.ab:hover.d { border-color:var(--danger); color:var(--danger); background:rgba(255,51,102,.1); }
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; padding:60px; color:rgba(232,244,255,.2); text-align:center; }
.empty-ico { font-size:52px; opacity:.35; }
.empty p { font-family:'Share Tech Mono'; font-size:11px; letter-spacing:2px; }
#toast { position:fixed; bottom:22px; right:22px; z-index:1000; font-family:'Share Tech Mono';
  font-size:12px; padding:11px 18px; border-radius:8px; transform:translateY(100px); opacity:0;
  transition:all .35s cubic-bezier(.34,1.56,.64,1); pointer-events:none; }
#toast.show { transform:translateY(0); opacity:1; }
#toast.ok  { background:rgba(0,255,159,.15); border:1px solid rgba(0,255,159,.4); color:var(--aurora); }
#toast.err { background:rgba(255,51,102,.15); border:1px solid rgba(255,51,102,.4); color:var(--danger); }
::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div id="stars"></div>

<header>
  <div class="logo">🛸</div>
  <div class="htxt">
    <h1>SPACE MISSION CONTROL</h1>
    <p>GESTIÓN DE MISIONES ESPACIALES · EPN FIS · CONSTRUCCIÓN DE SOFTWARE 2025</p>
  </div>
  <div class="hub-pill" id="hubPill">
    <div class="dot" id="hubDot"></div>
    <span id="hubLbl">HUB: VERIFICANDO...</span>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="sn c1" id="sT">0</div><div class="sl">Total Misiones</div></div>
  <div class="stat"><div class="sn c2" id="sA">0</div><div class="sl">En Curso</div></div>
  <div class="stat"><div class="sn c3" id="sC">0</div><div class="sl">Completadas</div></div>
  <div class="stat"><div class="sn c4" id="sF">0</div><div class="sl">Fallidas / Abortadas</div></div>
</div>

<div class="layout">
  <aside class="fp">
    <div class="ptitle">🛰 Registrar Misión</div>
    <div class="eb" id="eb">✏️ EDITANDO — <span id="eid"></span></div>

    <div class="fg"><label>Nombre de la Misión *</label>
      <input id="fN" type="text" placeholder="Ej: Artemis IV" maxlength="80"></div>

    <div class="row2">
      <div class="fg"><label>Agencia *</label>
        <select id="fAg" aria-label="agencia">
          <option value="">Seleccionar...</option>
          <option>NASA</option><option>ESA</option><option>SpaceX</option>
          <option>Roscosmos</option><option>CNSA</option><option>ISRO</option>
          <option>JAXA</option><option>Blue Origin</option><option>Otra</option>
        </select>
      </div>
      <div class="fg"><label>Tipo *</label>
        <select id="fTp" title="tipo">
          <option value="">Seleccionar...</option>
          <option>Orbital</option><option>Lunar</option><option>Marciana</option>
          <option>Interestelar</option><option>Estación Espacial</option>
          <option>Asteroide</option><option>Satelital</option>
        </select>
      </div>
    </div>

    <div class="fg"><label>Nave / Vehículo</label>
      <input id="fV" type="text" placeholder="Ej: SLS Block 1, Falcon Heavy..." maxlength="60"></div>

    <div class="row2">
      <div class="fg"><label>Fecha de Lanzamiento</label><input id="fD" type="date"></div>
      <div class="fg"><label>Estado</label>
        <select id="fSt" title="estado">
          <option value="planned">Planificada</option>
          <option value="active">En Curso</option>
          <option value="completed">Completada</option>
          <option value="failed">Fallida</option>
          <option value="aborted">Abortada</option>
        </select>
      </div>
    </div>

    <div class="fg"><label>Tripulantes (vacío = no tripulada)</label>
      <input id="fC" type="text" placeholder="Ej: Neil Armstrong, Buzz Aldrin" maxlength="120"></div>

    <div class="fg"><label>Descripción / Objetivo</label>
      <textarea id="fDs" placeholder="Objetivo principal de la misión..." maxlength="300"></textarea></div>

    <div class="brow">
      <button class="btn-p" id="btnSave" onclick="save()">🚀 LANZAR MISIÓN</button>
      <button class="btn-s" id="btnCancel" style="display:none" onclick="cancelEdit()">✕</button>
    </div>

    <div class="ptitle" style="margin-top:4px">📡 Log → Hub</div>
    <div class="elog" id="log">
      <div class="le"><span class="lt">SISTEMA</span><span class="lm" style="color:rgba(0,212,255,.4)">Iniciando Space Mission Control...</span></div>
    </div>
  </aside>

  <section class="mp">
    <div class="mh">
      <input class="sb" id="srch" placeholder="🔍  Buscar misión, agencia, tipo..." oninput="render()">
      <div class="fbs">
        <button class="fb act" onclick="setF(this,'all')">TODAS</button>
        <button class="fb" onclick="setF(this,'planned')">PLAN.</button>
        <button class="fb" onclick="setF(this,'active')">ACTIVAS</button>
        <button class="fb" onclick="setF(this,'completed')">COMP.</button>
        <button class="fb" onclick="setF(this,'failed')">FALL.</button>
      </div>
    </div>
    <div class="ml" id="ml"></div>
  </section>
</div>

<div id="toast"></div>

<script>
// ── ESTRELLAS ──────────────────────────────────────────────
const sf=document.getElementById('stars');
for(let i=0;i<160;i++){
  const s=document.createElement('div'); s.className='s';
  const z=Math.random()*2+.5;
  s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s;opacity:${(.2+Math.random()*.6).toFixed(2)}`;
  sf.appendChild(s);
}

// ── CONFIG ─────────────────────────────────────────────────
// Tu CRUD corre en :4000, el Event Manager en :3000
const API = 'http://localhost:4000';
const HUB = 'http://localhost:3000';

let missions = [];
let editId   = null;
let curFilter= 'all';

// ── PING AL HUB ────────────────────────────────────────────
async function pingHub(){
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(2500) });
    const data = await r.json();
    const ok = r.ok && data.status === 'ok';
    document.getElementById('hubDot').className  = 'dot' + (ok ? ' ok' : '');
    document.getElementById('hubLbl').textContent = ok ? 'HUB: CONECTADO ✓' : 'HUB: ERROR';
    document.getElementById('hubPill').className  = 'hub-pill' + (ok ? ' ok' : '');
  } catch {
    document.getElementById('hubDot').className  = 'dot';
    document.getElementById('hubLbl').textContent = 'HUB: OFFLINE';
    document.getElementById('hubPill').className  = 'hub-pill';
  }
}
pingHub();
setInterval(pingHub, 8000);

// ── LOG ────────────────────────────────────────────────────
function addLog(msg, type='ok'){
  const el  = document.getElementById('log');
  const d   = document.createElement('div');
  d.className = `le ${type}`;
  const t   = new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.innerHTML = `<span class="lt">${t}</span><span class="lm">${msg}</span>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ── TOAST ──────────────────────────────────────────────────
function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3200);
}

// ── CARGAR MISIONES DESDE EL SERVIDOR ─────────────────────
async function loadMissions(){
  try {
    const r    = await fetch(`${API}/missions`);
    missions   = await r.json();
    addLog(`QUERY → ${missions.length} misiones cargadas`, 'ok');
    render();
    stats();
  } catch(e) {
    addLog('Error cargando misiones del servidor', 'err');
  }
}

// ── GUARDAR (CREATE o UPDATE) ──────────────────────────────
async function save(){
  const name  = document.getElementById('fN').value.trim();
  const agency= document.getElementById('fAg').value;
  const type  = document.getElementById('fTp').value;
  const vehicle=document.getElementById('fV').value.trim();
  const date  = document.getElementById('fD').value;
  const status= document.getElementById('fSt').value;
  const crew  = document.getElementById('fC').value.trim();
  const desc  = document.getElementById('fDs').value.trim();

  if(!name || !agency || !type){
    toast('⚠️ Nombre, Agencia y Tipo son obligatorios', 'err');
    return;
  }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;

  if(editId){
    // ── UPDATE ──────────────────────────────────────────────
    try {
      const r = await fetch(`${API}/missions/${editId}`, {
        method : 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ name, agency, type, vehicle, date, status, crew, description: desc })
      });
      if(!r.ok){ const e = await r.json(); toast(`⚠️ ${e.error}`, 'err'); btn.disabled=false; return; }
      addLog(`UPDATE → "${name}" · evento enviado al Hub`, 'ok');
      toast('✓ Misión actualizada · evento enviado', 'ok');
      cancelEdit();
      await loadMissions();
    } catch(e) {
      addLog('Error al actualizar misión', 'err');
      toast('❌ Error al actualizar', 'err');
    }
  } else {
    // ── CREATE ──────────────────────────────────────────────
    try {
      const r = await fetch(`${API}/missions`, {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ name, agency, type, vehicle, date, status, crew, description: desc })
      });
      if(!r.ok){ const e = await r.json(); toast(`⚠️ ${e.error}`, 'err'); btn.disabled=false; return; }
      const created = await r.json();
      addLog(`CREATE → "${created.name}" (${created.id}) · evento enviado al Hub`, 'ok');
      toast('🚀 Misión lanzada · evento enviado al Hub', 'ok');
      clearForm();
      await loadMissions();
    } catch(e) {
      addLog('Error al crear misión — ¿está corriendo server.js?', 'err');
      toast('❌ Error: verifica que server.js esté corriendo', 'err');
    }
  }
  btn.disabled = false;
}

// ── EDITAR ─────────────────────────────────────────────────
function edit(id){
  const m = missions.find(x => x.id === id);
  if(!m) return;
  editId = id;
  document.getElementById('fN').value  = m.name;
  document.getElementById('fAg').value = m.agency;
  document.getElementById('fTp').value = m.type;
  document.getElementById('fV').value  = m.vehicle  || '';
  document.getElementById('fD').value  = m.date     || '';
  document.getElementById('fSt').value = m.status;
  document.getElementById('fC').value  = m.crew     || '';
  document.getElementById('fDs').value = m.description || '';
  document.getElementById('eb').classList.add('show');
  document.getElementById('eid').textContent      = id;
  document.getElementById('btnCancel').style.display = 'block';
  document.getElementById('btnSave').textContent  = '💾 ACTUALIZAR';
  document.querySelector('.fp').scrollTop = 0;

  // Enviar evento QUERY al hub cuando se consulta una misión
  fetch(`${API}/missions/${id}`).catch(() => {});
  addLog(`QUERY → Consultando "${m.name}"`, 'warn');
}

function cancelEdit(){
  editId = null;
  document.getElementById('eb').classList.remove('show');
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('btnSave').textContent     = '🚀 LANZAR MISIÓN';
  clearForm();
}

// ── ELIMINAR ───────────────────────────────────────────────
async function del(id){
  const m = missions.find(x => x.id === id);
  if(!m) return;
  if(!confirm(`¿Eliminar la misión "${m.name}"?\nSe enviará un evento DELETE al Hub.`)) return;
  try {
    const r = await fetch(`${API}/missions/${id}`, { method: 'DELETE' });
    if(!r.ok){ toast('❌ Error al eliminar', 'err'); return; }
    addLog(`DELETE → "${m.name}" · evento enviado al Hub`, 'err');
    toast('🗑 Misión eliminada · evento DELETE enviado', 'ok');
    if(editId === id) cancelEdit();
    await loadMissions();
  } catch(e) {
    addLog('Error al eliminar misión', 'err');
    toast('❌ Error al eliminar', 'err');
  }
}

// ── FILTROS ────────────────────────────────────────────────
function setF(btn, f){
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
  curFilter = f;
  render();
}

// ── RENDER ─────────────────────────────────────────────────
const SL = {
  planned  : 'PLANIFICADA',
  active   : 'EN CURSO',
  completed: 'COMPLETADA',
  failed   : 'FALLIDA',
  aborted  : 'ABORTADA'
};

function render(){
  const q    = document.getElementById('srch').value.toLowerCase();
  let   list = curFilter === 'all'
    ? missions
    : missions.filter(m => m.status === curFilter);
  if(q) list = list.filter(m =>
    (m.name + m.agency + m.type + m.vehicle + m.crew).toLowerCase().includes(q)
  );

  const el = document.getElementById('ml');

  if(!list.length){
    el.innerHTML = `
      <div class="empty">
        <div class="empty-ico">🌌</div>
        <p>NO HAY MISIONES EN ESTA CATEGORÍA</p>
        <p style="margin-top:4px;font-size:10px;opacity:.6">Registra una nueva misión en el panel izquierdo</p>
      </div>`;
    return;
  }

  el.innerHTML = list.map((m, i) => `
    <div class="mc" data-s="${m.status}" style="animation-delay:${i*.04}s">
      <div>
        <div class="mid">ID: ${m.id}</div>
        <div class="mn">${m.name}</div>
        <div class="mm">
          <span class="badge ${m.status}">${SL[m.status] || m.status}</span>
          <span class="mt">🏛 ${m.agency}</span>
          <span class="mt">🛸 ${m.type}</span>
          ${m.vehicle   ? `<span class="mt">🚀 ${m.vehicle}</span>` : ''}
          ${m.date      ? `<span class="mt">📅 ${m.date}</span>` : ''}
          ${m.crew
            ? `<span class="mt">👨‍🚀 ${m.crew.substring(0,30)}${m.crew.length>30?'…':''}</span>`
            : '<span class="mt">🤖 No tripulada</span>'}
        </div>
        ${m.description
          ? `<div class="mdesc">${m.description.substring(0,130)}${m.description.length>130?'…':''}</div>`
          : ''}
      </div>
      <div class="acts">
        <button class="ab e" onclick="edit('${m.id}')"  title="Editar">✏️</button>
        <button class="ab d" onclick="del('${m.id}')"   title="Eliminar">🗑</button>
      </div>
    </div>`).join('');
}

// ── ESTADÍSTICAS ───────────────────────────────────────────
function stats(){
  document.getElementById('sT').textContent = missions.length;
  document.getElementById('sA').textContent = missions.filter(m => m.status === 'active').length;
  document.getElementById('sC').textContent = missions.filter(m => m.status === 'completed').length;
  document.getElementById('sF').textContent = missions.filter(m =>
    ['failed','aborted'].includes(m.status)).length;
}

// ── LIMPIAR FORMULARIO ─────────────────────────────────────
function clearForm(){
  ['fN','fV','fD','fC','fDs'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fAg').value = '';
  document.getElementById('fTp').value = '';
  document.getElementById('fSt').value = 'planned';
}

// ── INICIO ─────────────────────────────────────────────────
loadMissions();
</script>
